name: Release Windows Binary

on:
  push:
    tags:
      - 'v*'  # e.g., v1.0.0

jobs:
  release:
    name: Build and Release Windows Binary
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename binary to ferriskeys.exe
        run: |
          mkdir dist
          copy target\x86_64-pc-windows-msvc\release\ferriskeys.exe dist\ferriskeys.exe

      - name: Generate SHA-256 checksum
        shell: powershell
        run: |
          Get-FileHash dist\ferriskeys.exe -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash) *ferriskeys.exe" | Out-File -Encoding ASCII -NoNewline dist\SHA256SUMS.txt
          }

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ferriskeys.exe
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.FERRISKEYS_TOKEN }}
